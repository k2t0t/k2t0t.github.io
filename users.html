<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>users/ — need help on linux?</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .breadcrumb {
            font-family: var(--font-mono);
            font-size: 0.82rem;
            color: var(--text-dim);
            margin: 0 0 20px;
        }
        .breadcrumb .path { color: var(--accent-cyan); }

        .log-line--heading {
            color: var(--accent-amber-bright);
            font-weight: 700;
            font-size: 1rem;
            margin-top: 6px;
        }
        .log-line--body        { color: var(--text-secondary); padding-left: 2px; }
        .log-line--indent      { color: var(--text-secondary); padding-left: 20px; }
        .log-line--cmd-example { color: var(--accent-amber); padding-left: 20px; }
        .log-line--divider     { color: var(--border-strong); letter-spacing: 2px; }

        /* natural scroll */
        .terminal-log { margin-bottom: 12px; }

        .file-unread { color: var(--text-primary); }
        .file-read   { color: var(--text-dim); }
    </style>
</head>
<body>
    <p class="eyebrow">
        <span class="prompt-symbol">frhs@ubuntu:~/home/frhs/users#</span>
    </p>

    <h1>welcome to user management</h1>
    <h2>introduction to user and group access</h2>

    <div id="terminal-log" class="terminal-log" role="log" aria-live="polite"></div>

    <div class="terminal-input" id="input-row">
        <span class="prompt-symbol">frhs@ubuntu:~/home/frhs/users#</span>
        <input
            type="text"
            id="cmd-input"
            class="cmd-input"
            autocomplete="off"
            autocapitalize="off"
            spellcheck="false"
            placeholder="try: ls"
            aria-label="Terminal command input">
    </div>

    <div class="terminal-input" id="nav-hint" style="display:none">
        <span class="prompt-symbol">frhs@ubuntu:~/home/frhs/users#</span>
        <input
            type="text"
            id="nav-input"
            class="cmd-input"
            autocomplete="off"
            autocapitalize="off"
            spellcheck="false"
            placeholder="cd .. to go back"
            aria-label="Navigation input">
    </div>

    <noscript>
        <p>Enable JavaScript to use the interactive terminal.</p>
        <a href="index.html"><button>Return to Homepage</button></a>
    </noscript>

    <script>
    (function () {
        var PROMPT = 'frhs@ubuntu:~/home/frhs/users# ';

        var input    = document.getElementById('cmd-input');
        var log      = document.getElementById('terminal-log');
        var hint     = document.getElementById('nav-hint');
        var inputRow = document.getElementById('input-row');

        var read = {
            'introduction.txt': false,
            'passwd': false,
            'root.txt':   false,
            'regular.txt':      false,
            'system.txt':   false,
            'admin.txt':    false,
            'groups.txt':   false
        };

        var FILES     = Object.keys(read);
        var COMMANDS  = ['ls', 'cat', 'cd', 'pwd'];
        var CD_MAIN   = ['..', '~', '/home'];
        var CD_NAV    = ['..', '/home', '../passwords', '../ssh', '../basics', '../services', '../backdoors'];

        // ── helpers ────────────────────────────────────────────────

        // cat jumps to new content
        function addLine(text, cls) {
            var p = document.createElement('p');
            p.className = 'log-line ' + (cls || '');
            p.textContent = text;
            log.appendChild(p);
            return p; // caller can use the returned node as a scroll anchor
        }

        function addBlank() { return addLine('', ''); }

        function scrollToEl(el) {
            requestAnimationFrame(function() {
                el.scrollIntoView({ behavior: 'smooth', block: 'start' });
            });
        }

        function updatePlaceholder() {
            var unread = FILES.filter(function(f){ return !read[f]; });
            input.placeholder = unread.length === 0
                ? 'all files read! cd .. to go back'
                : 'try: cat ' + unread[0];
        }

        // ── tab completion ─────────────────────────────────────────
        function tabComplete(inputEl, availableFiles, availableCd) {
            var val   = inputEl.value;
            var parts = val.split(/\s+/);
            var cmd   = parts[0].toLowerCase();

            if (parts.length === 1 && !val.endsWith(' ')) {
                var m = COMMANDS.filter(function(c){ return c.startsWith(cmd); });
                if (m.length === 1) inputEl.value = m[0] + ' ';
                return;
            }

            var partial = parts.slice(1).join(' ');

            if (cmd === 'cat') {
                var m = availableFiles.filter(function(f){ return f.startsWith(partial); });
                if (m.length === 1) inputEl.value = 'cat ' + m[0];
            } else if (cmd === 'cd') {
                var m = availableCd.filter(function(d){ return d.startsWith(partial); });
                if (m.length === 1) inputEl.value = 'cd ' + m[0];
            } else if (cmd === 'ls') {
                var flags = ['-l', '-la'];
                var idx = flags.indexOf(partial);
                inputEl.value = 'ls ' + flags[(idx + 1) % flags.length];
            }
        }

        input.addEventListener('keydown', function(e) {
            if (e.key === 'Tab') {
                e.preventDefault();
                tabComplete(input, FILES, CD_MAIN);
            }
        });

        // ── ls ─────────────────────────────────────────────────────
        function doLs(args) {
            var flagChars = args.join('').replace(/-/g,'').toLowerCase();
            var wantsLong = flagChars.indexOf('l') !== -1;
            var wantsAll  = flagChars.indexOf('a') !== -1;

            var files = [
                { name: 'introduction.txt', desc: 'an introduction to users and group management' },
                { name: 'passwd', desc: '/etc/passwd - essential user info'},
                { name: 'root.txt',   desc: 'understanding the superuser' },
                { name: 'regular.txt',      desc: 'understanding regular user accounts' },
                { name: 'system.txt',      desc: 'understanding system users' },
                { name: 'admin.txt',      desc: 'understanding administrators and sudo' },
                { name: 'groups.txt',      desc: 'basics about group management' }
            ];

            if (wantsLong) {
                addLine('total 3', 'log-line--info');
                files.forEach(function(f) {
                    var p = document.createElement('p');
                    p.className = 'log-line log-line--dir';

                    var perm = document.createElement('span');
                    perm.className = 'dir-perm';
                    perm.textContent = '-rw-r--r--';

                    var name = document.createElement('span');
                    name.className = 'dir-name ' + (read[f.name] ? 'file-read' : 'file-unread');
                    name.textContent = f.name;

                    var desc = document.createElement('span');
                    desc.className = 'dir-desc';
                    desc.textContent = f.desc;

                    p.appendChild(perm); p.appendChild(name); p.appendChild(desc);
                    log.appendChild(p);
                });
            } else {
                var row = document.createElement('p');
                row.className = 'log-line log-line--ls';
                files.forEach(function(f) {
                    var span = document.createElement('span');
                    span.className = 'dir-name ' + (read[f.name] ? 'file-read' : 'file-unread');
                    span.textContent = f.name;
                    row.appendChild(span);
                });
                log.appendChild(row);
            }

            if (wantsLong && wantsAll) {
                addLine('# continuing to use ls -la is a good habit to build!', 'log-line--easter');
            }

            updatePlaceholder();
        }

        // ── cat functions — each returns its anchor element ────────

        function catIntroduction() {
            addBlank();
            var anchor = addLine('─── introduction.txt ─────────────────────────────────', 'log-line--divider');
            addBlank();
            addLine('USER AND GROUP MANAGEMENT', 'log-line--heading');
            addBlank();
            addLine('welcome to users and groups!', 'log-line--body');
            addLine('understanding of the users of a system is the key to understanding security', 'log-line--body');
            addLine('hackers are users btw, so it\'s definitely great to know how to block them!', 'log-line--body');
            addBlank();
            addLine('this directory will give you all the info about user management in linux', 'log-line--body');
            addLine('covering the superuser, regular users, system users, administrators, and groups', 'log-line--body');
            addBlank();
            addLine('─── end of file ──────────────────────────────────────', 'log-line--divider');
            addBlank();
            return anchor;
        }

        function catRoot() {
            addBlank();
            var anchor = addLine('─── root.txt ───────────────────────────────────', 'log-line--divider');
            addBlank();
            addLine('THE ULTIMATE SUPERUSER', 'log-line--heading');
            addLine('this is the most powerful user in linux', 'log-line--body');
            addLine('the root user can easily run any command or access files without safety filters', 'log-line--body');
            addLine('so naturally, this user is off limits to regular users', 'log-line--body');
            addBlank();
            addLine('most systems already lock direct root access', 'log-line--body');
            addBlank();
            addLine('sometimes it doesn\'t even have to be the root user itself to do these almighty things', 'log-line--body');
            addLine('the root user\'s UID is 0 and always 0', 'log-line--body');
            addLine('this means that any user with a UID of 0 can also be as almighty as the root user', 'log-line--body');
            addLine('that said, it\'s always a good practice to keep the power where it belongs...', 'log-line--body');
            addBlank();
            addLine('─── end of file ──────────────────────────────────────', 'log-line--divider');
            addBlank();
            return anchor;
        }

        function catPasswd() {
            addBlank();
            var anchor = addLine('─── passwd ──────────────────────────────────────', 'log-line--divider');
            addBlank();
            addLine('/etc/passwd', 'log-line--heading');
            addBlank();
            addLine('the passwd file contains a list of all users on the system, both regular and system users', 'log-line--body');
            addLine('this file is readable by all, but only writable by root or administrators', 'log-line--body');
            addLine('each line follows the following format:', 'log-line--body');
            addLine('    username:x:uid:gid:description:home directory:default login shell', 'log-line--cmd-example');
            addLine('a real example:', 'log-line--body');
            addLine('    frhs:x:1000:1000:,,,:/home/frhs:/bin/bash', 'log-line--cmd-example');
            addLine('  field 1 — username (frhs)', 'log-line--indent');
            addLine('  field 2 — x - password is stored in /etc/shadow');
            addLine('  field 3 — user ID', 'log-line--indent');
            addLine('  field 4 — group ID', 'log-line--indent');
            addLine('  field 5 — description (name, room number, telephone)', 'log-line--indent');
            addLine('  field 6 — home directory', 'log-line--indent');            
            addLine('  field 7 — default login shell', 'log-line--indent');
            addLine('login shells allows you to login and interact with your system.', 'log-line--body');
            addBlank();
            addLine('─── end of file ──────────────────────────────────────', 'log-line--divider');
            addBlank();
            
            return anchor;
        }

        function catRegular() {
            addBlank();
            var anchor = addLine('─── regular.txt ──────────────────────────────────────', 'log-line--divider');
            addBlank();
            addLine('REGULAR USER MANAGEMENT', 'log-line--heading');
            addBlank();
            addLine('regular users are the user accounts on the system that allows normal people to use the computer.', 'log-line--body');
            addLine('it is always important to allow certain people access to your system to minimize malicious attacks.', 'log-line--body');
            addLine('a list of regular users is either present in the /home directory or the /etc/passwd file.', 'log-line--body');
            addBlank();
            addLine('here are some facts about regular users:', 'log-line--body');
            addLine('  they have a UID of 1000 or greater', 'log-line--body');
            addLine('  they cannot modify critical files in the system', 'log-line--body');
            addLine('  they each own a home directory, thus allowing you to view them in the /home directory', 'log-line--body');
            addLine('  they can only modify information about themselves to a certain degree', 'log-line--body');
            addLine('  these are some of the basics', 'log-line--body');
            addBlank();
            addLine('─── end of file ──────────────────────────────────────', 'log-line--divider');
            addBlank();
            return anchor;
        }

        function catSystem() {
            addBlank();
            var anchor = addLine('─── system.txt ──────────────────────────────────────', 'log-line--divider');
            addBlank();
            addLine('SYSTEM USER MANAGEMENT', 'log-line--heading');
            addBlank();
            addLine('system users are users created by the operating system or installed services.', 'log-line--body');
            addLine('these users are necessary for the system\'s and services\' functionality.', 'log-line--body');
            addLine('they exists so that background processes (daemons) can run with their own permissions', 'log-line--body');
            addLine('system users can be viewed in the /etc/passwd file.', 'log-line--body');
            addLine('they typically have a UID of 1 - 999.', 'log-line--body');
            addLine('since they are unable to login, they do not have a home directory', 'log-line--body');
            addBlank();
            addLine('here are some of the common system users and their functionality:', 'log-line--body');
            addLine('  www-data                    # used by web servers', 'log-line--cmd-example');
            addLine('  mysql or postgres           # used by databases (use keys instead)', 'log-line--cmd-example');
            addLine('  sshd                        # used for (on some systems) SSH', 'log-line--cmd-example');
            addLine('  mail                        # used for mail related services', 'log-line--cmd-example');
            addBlank();
            addLine('unlike regular users, system users cannot login and interact with the system', 'log-line--body');
            addLine('this is because they have a non-loginable shell', 'log-line--body');
            addLine('  /usr/sbin/nologin or /bin/false are common examples', 'log-line--cmd-example');
            addLine('therefore it is a good security benchmark to make sure they cannot login', 'log-line--body');
            addLine('like regular users, they cannot change important system settings', 'log-line--body');
            addBlank();
            addLine('HIDDEN USERS', 'log-line--heading');
            addBlank();
            addLine('there may be some anomalies that may cause a regular user to become hidden like a system user', 'log-line--body');
            addLine('meaning that they have no home directory to detect their presence.', 'log-line--body');
            addLine('hidden users tend to have a UID of 1 - 999 like system users', 'log-line--body');
            addLine('unlike system users however, they have a loginable shell like /bin/bash');
            addLine('here is an example: ', 'log-line--body');
            addLine('  user:x:42:42:user:/tmp:/bin/bash', 'log-line--cmd-example');
            addBlank();
            addLine('─── end of file ──────────────────────────────────────', 'log-line--divider');
            addBlank();
            return anchor;
        }

        function catAdmin() {
            addBlank();
            var anchor = addLine('─── admin.txt ──────────────────────────────────────', 'log-line--divider');
            addBlank();
            addLine('SYSTEM ADMINISTRATOR MANAGEMENT', 'log-line--heading');
            addBlank();
            addLine('administrators are regular users but a lot more powerful.', 'log-line--body');
            addLine('they are regular users that are in the sudo or adm group', 'log-line--body');
            addLine('as admin, you can make important changes in the system.', 'log-line--body');
            addLine('as admin, you can do things like add/delete users, update the system, remove malware, etc.', 'log-line--body');
            addLine('in order to use these privileges, you must add the sudo command before every command you execute', 'log-line--body');
            addLine('  nano /etc/passwd            # editing an important system file, forbidden to regular users (read-only)', 'log-line--cmd-example');
            addLine('  sudo nano /etc/passwd       # the sudo command runs this command as root, allowing modifications', 'log-line--cmd-example');
            addBlank();
            addLine('this means that it is the admin\'s duty to secure the system.', 'log-line--body');
            addLine('admins must enter a password before running commands as root for security purposes. ', 'log-line--body');
            addBlank();
            addLine('it is always important to make sure that the right people have sudo privileges', 'log-line--body');
            addLine('make sure the sudo group contains the right users', 'log-line--body');
            addLine('more advanced admin management lies in the /etc/sudoers file', 'log-line--body');
            addLine('use the sudo visudo command to modify this file if needed', 'log-line--body');
            addLine('  Defaults !authenticate       # allows anyone to run commands as root', 'log-line--cmd-example');
            addLine('  user ALL=(ALL) NOPASSWD: ALL # allows that user to run as root without a password', 'log-line--cmd-example');
            addBlank();
            addLine('SYSTEM USER SECURITY', 'log-line--heading');
            addLine('since admins can act as root, here are the things they should do to secure the system', 'log-line--body');
            addLine('  $  sudo deluser user         # removes a user from the system', 'log-line--cmd-example');
            addLine('  $  sudo adduser user         # adds a user to the system', 'log-line--cmd-example');
            addLine('  $  sudo deluser user group   # removes a user from a group', 'log-line--cmd-example');
            addBlank();
            addLine('USER SUBSTITUTION', 'log-line--heading');
            addBlank();
            addLine('tired of typing the sudo command before everything?', 'log-line--body');
            addLine('  $  sudo su                   # lets you log in as root itself', 'log-line--cmd-example');
            addLine('only administrators will have this privilege', 'log-line--body');
            addLine('this will come in handy if you must do a lot of changes or type lots of commands', 'log-line--body');
            addLine('this method can be dangerous however', 'log-line--cmd-example');
            addLine('this removes the normal human error checks when you type in commands', 'log-line--body');
            addLine('if you abandon the terminal leaving the terminal and system on,', 'log-line--body');
            addLine('anyone with physical or remote access to the computer inherits full admin powers', 'log-line--body');
            addBlank();
            addLine('─── end of file ──────────────────────────────────────', 'log-line--divider');
            addBlank();
            return anchor;
        }

        function catGroups() {
            addBlank();
            var anchor = addLine('─── groups.txt ──────────────────────────────────────', 'log-line--divider');
            addBlank();
            addLine('USER GROUP MANAGEMENT', 'log-line--heading');
            addBlank();
            addLine('groups in linux gives regular users certain permissions.', 'log-line--body');
            addLine('all group info is stored in /etc/group', 'log-line--body');
            addLine('each line follows this format:', 'log-line--body');
            addLine('  group name:x:gid:group members', 'log-line--cmd-example');
            addLine('the x again represents a password, stored in /etc/gshadow', 'log-line--body');
            addLine('there is rarely a password for groups nowadays', 'log-line--body');
            addBlank();
            addLine('as mentioned before, the sudo or adm group allows regular users to become root.', 'log-line--body');
            addLine('here are other groups that gives users certain permissions:', 'log-line--body');
            addLine('  audio                       # allows users to access audio devices', 'log-line--cmd-example');
            addLine('  lp                          # allows users to access the printer', 'log-line--cmd-example');
            addLine('  docker                      # allows users to run docker commands as root', 'log-line--cmd-example');
            addBlank();
            addLine('each user has their own group, regular and system', 'log-line--body');
            addLine('each file has a group owner, meaning that only people in that group can access that file', 'log-line--body');
            addLine('this means that users can only access the files they own', 'log-line--body');
            addBlank();
            addLine('therefore, it is important to keep users in the groups they belong', 'log-line--body');
            addBlank();
            addLine('─── end of file ──────────────────────────────────────', 'log-line--divider');
            addBlank();
            return anchor;
        }

        // ── cat dispatcher ─────────────────────────────────────────
        function doCat(target) {
            var anchor;
            if (target === 'introduction.txt') {
                anchor = catIntroduction();
                read['introduction.txt'] = true;
            } else if (target === 'root.txt') {
                anchor = catRoot();
                read['root.txt'] = true;
            } else if (target === 'regular.txt') {
                anchor = catRegular();
                read['regular.txt'] = true;
            } else if (target === 'system.txt') {
                anchor = catSystem();
                read['system.txt'] = true;
            } else if (target === 'admin.txt') {
                anchor = catAdmin();
                read['admin.txt'] = true;
            } else if (target === 'groups.txt') {
                anchor = catGroups();
                read['groups.txt'] = true;
            } else if (target === 'passwd') {
                anchor = catPasswd();
                read['passwd'] = true;
            } else {
                addLine('cat: ' + target + ': No such file or directory', 'log-line--error');
                return;
            }

            // scroll is handled by the parent input handler via anchorIndex
            updatePlaceholder();

            if (FILES.every(function(f){ return read[f]; })) {
                inputRow.style.display = 'none';
                hint.style.display = 'flex';
                document.getElementById('nav-input').focus();
            }
        }

        // ── main input handler ─────────────────────────────────────
        input.addEventListener('keydown', function(e) {
            if (e.key !== 'Enter') return;
            var raw = input.value.trim();
            if (raw === '') return;

            addLine(PROMPT + raw, 'log-line--cmd');
            input.value = '';

            // snapshot child count before any output is added — whatever
            // lands at this index is the first new line, and we scroll to it
            var anchorIndex = log.children.length;

            var parts = raw.split(/\s+/);
            var cmd   = parts[0].toLowerCase();
            var args  = parts.slice(1);

            if (cmd === 'ls') {
                doLs(args);
            } else if (cmd === 'cat') {
                if (!args[0]) {
                    addLine('cat: missing operand', 'log-line--error');
                } else {
                    doCat(args[0].toLowerCase());
                }
            } else if (cmd === 'cd') {
                var target = args.join('');
                if (!target || target === '..' || target === '~' || target === '/home') {
                    window.location.href = 'index.html';
                } else {
                    addLine('bash: cd: ' + target + ': No such file or directory', 'log-line--error');
                }
            } else if (cmd === 'pwd') {
                addLine('/home/frhs/users', 'log-line--info');
            } else {
                addLine('bash: ' + cmd + ': command not found', 'log-line--error');
            }

            var anchor = log.children[anchorIndex];
            if (anchor) scrollToEl(anchor);
        });

        // ── nav input ──────────────────────────────────────────────
        var navInput = document.getElementById('nav-input');

        navInput.addEventListener('keydown', function(e) {
            if (e.key === 'Tab') {
                e.preventDefault();
                tabComplete(navInput, FILES, CD_NAV);
                return;
            }
            if (e.key !== 'Enter') return;
            var raw = navInput.value.trim();
            if (raw === '') return;

            addLine(PROMPT + raw, 'log-line--cmd');
            navInput.value = '';

            var anchorIndex = log.children.length;

            var parts = raw.split(/\s+/);
            var cmd   = parts[0].toLowerCase();
            var args  = parts.slice(1);

            if (cmd === 'ls') {
                doLs(args);
            } else if (cmd === 'pwd') {
                addLine('/home/frhs/users', 'log-line--info');
            } else if (cmd === 'cd') {
                var target = args.join('');
                var routes = {
                    '..':           'index.html',
                    '~':            'index.html',
                    '/home':        'index.html',
                    '../passwords': 'passwords.html',
                    '../users':     'users.html',
                    '../ssh':       'ssh.html',
                    '../services':  'pas.html',
                    '../backdoors': 'backdoors.html'
                };
                if (routes[target]) {
                    addLine('leaving users/ ...', 'log-line--info');
                    navInput.disabled = true;
                    setTimeout(function(){ window.location.href = routes[target]; }, 400);
                } else {
                    addLine('bash: cd: ' + target + ': No such file or directory', 'log-line--error');
                }
            } else {
                addLine('bash: ' + cmd + ': command not found', 'log-line--error');
            }

            var anchor = log.children[anchorIndex];
            if (anchor) scrollToEl(anchor);
        });

        input.focus();
    })();
    </script>
</body>
</html>
