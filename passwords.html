<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>passwords/ — need help on linux?</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .log-line--heading {
            color: var(--accent-amber-bright);
            font-weight: 700;
            font-size: 1rem;
            margin-top: 6px;
        }
        .log-line--body        { color: var(--text-secondary); padding-left: 2px; }
        .log-line--indent      { color: var(--text-secondary); padding-left: 20px; }
        .log-line--cmd-example { color: var(--accent-amber); padding-left: 20px; }
        .log-line--divider     { color: var(--border-strong); letter-spacing: 2px; }
        .terminal-log          { margin-bottom: 12px; }
        .file-unread           { color: var(--text-primary); }
        .file-read              { color: var(--text-dim); }
        .dir-highlight          { color: var(--accent-amber-bright); font-weight: 700; }
    </style>
</head>
<body>
    <p class="eyebrow">
        <span class="prompt-symbol">frhs@ubuntu:~/home/frhs/passwords#</span>
    </p>

    <h1>welcome to passwords</h1>
    <h2>user auditing, accounts, and privilege management</h2>

    <div id="terminal-log" class="terminal-log" role="log" aria-live="polite"></div>

    <div class="terminal-input" id="input-row">
        <span class="prompt-symbol">frhs@ubuntu:~/home/frhs/passwords#</span>
        <input type="text" id="cmd-input" class="cmd-input"
            autocomplete="off" autocapitalize="off" spellcheck="false"
            placeholder="try: ls" aria-label="Terminal command input">
    </div>

    <div class="terminal-input" id="nav-hint" style="display:none">
        <span class="prompt-symbol">frhs@ubuntu:~/home/frhs/passwords#</span>
        <input type="text" id="nav-input" class="cmd-input"
            autocomplete="off" autocapitalize="off" spellcheck="false"
            placeholder="cd .. to go back" aria-label="Navigation input">
    </div>

    <noscript>
        <p>Enable JavaScript to use the interactive terminal.</p>
        <a href="index.html"><button>Return to Homepage</button></a>
    </noscript>

    <script>
    (function () {
        var PROMPT = 'frhs@ubuntu:~/home/frhs/passwords# ';
        var input    = document.getElementById('cmd-input');
        var log      = document.getElementById('terminal-log');
        var hint     = document.getElementById('nav-hint');
        var inputRow = document.getElementById('input-row');

        // NOTE: pam.d is directory so not here
        var read = {
            'introduction.txt': false,
            'passwords.txt':    false,
            'shadow':           false,
            'login.defs':       false,
            'forensics.txt':    false,
            'databases.txt':    false,
            'commands.txt':     false,
            'tldr.txt':         false
        };

        var FILES    = Object.keys(read);
        var COMMANDS = ['ls', 'cat', 'cd', 'pwd'];
        var CD_MAIN  = ['..', '~', '/home', 'pam.d'];
        var CD_NAV   = ['..', '/home', '../basics', '../passwords', '../ssh', '../services', '../backdoors'];

        function addLine(text, cls) {
            var p = document.createElement('p');
            p.className = 'log-line ' + (cls || '');
            p.textContent = text;
            log.appendChild(p);
            return p;
        }
        function addBlank() { return addLine('', ''); }
        function scrollToEl(el) {
            requestAnimationFrame(function() {
                el.scrollIntoView({ behavior: 'smooth', block: 'start' });
            });
        }
        function updatePlaceholder() {
            var unread = FILES.filter(function(f){ return !read[f]; });
            input.placeholder = unread.length === 0
                ? 'all files read! cd .. to go back'
                : 'try: cat ' + unread[0];
        }

        function tabComplete(inputEl, availableFiles, availableCd) {
            var val = inputEl.value, parts = val.split(/\s+/), cmd = parts[0].toLowerCase();
            if (parts.length === 1 && !val.endsWith(' ')) {
                var m = COMMANDS.filter(function(c){ return c.startsWith(cmd); });
                if (m.length === 1) inputEl.value = m[0] + ' ';
                return;
            }
            var partial = parts.slice(1).join(' ');
            if (cmd === 'cat') {
                var m = availableFiles.filter(function(f){ return f.startsWith(partial); });
                if (m.length === 1) inputEl.value = 'cat ' + m[0];
            } else if (cmd === 'cd') {
                var m = availableCd.filter(function(d){ return d.startsWith(partial); });
                if (m.length === 1) inputEl.value = 'cd ' + m[0];
            } else if (cmd === 'ls') {
                var flags = ['-l', '-la'], idx = flags.indexOf(partial);
                inputEl.value = 'ls ' + flags[(idx + 1) % flags.length];
            }
        }

        input.addEventListener('keydown', function(e) {
            if (e.key === 'Tab') { e.preventDefault(); tabComplete(input, FILES, CD_MAIN); }
        });

        function doLs(args) {
            var fc = args.join('').replace(/-/g,'').toLowerCase();
            var wantsLong = fc.indexOf('l') !== -1, wantsAll = fc.indexOf('a') !== -1;
            var files = [
                { name: 'introduction.txt', desc: 'overview to password safety' },
                { name: 'passwords.txt',    desc: 'basic password security' },
                { name: 'shadow',           desc: '/etc/shadow — password hashing' },
                { name: 'login.defs',       desc: '/etc/login.defs — login and password configuration' },
                { name: 'pam.d/',           desc: 'pam.d/ — directory', dir: true },
                { name: 'forensics.txt',    desc: 'locating exposed and hardcoded passwords' },
                { name: 'databases.txt',    desc: 'exposed passwords in databases' },
                { name: 'commands.txt',     desc: 'useful commands for password management' },
                { name: 'tldr.txt',         desc: 'quick reference' }
            ];
            if (wantsLong) {
                addLine('total ' + files.length, 'log-line--info');
                files.forEach(function(f) {
                    var p = document.createElement('p'); p.className = 'log-line log-line--dir';
                    var perm = document.createElement('span'); perm.className = 'dir-perm'; perm.textContent = f.dir ? 'drwxr-xr-x' : '-rw-r--r--';
                    var name = document.createElement('span'); name.className = 'dir-name ' + (f.dir ? 'dir-highlight' : (read[f.name] ? 'file-read' : 'file-unread')); name.textContent = f.name;
                    var desc = document.createElement('span'); desc.className = 'dir-desc'; desc.textContent = f.desc;
                    p.appendChild(perm); p.appendChild(name); p.appendChild(desc); log.appendChild(p);
                });
            } else {
                var row = document.createElement('p'); row.className = 'log-line log-line--ls';
                files.forEach(function(f) {
                    var span = document.createElement('span');
                    span.className = 'dir-name ' + (f.dir ? 'dir-highlight' : (read[f.name] ? 'file-read' : 'file-unread'));
                    span.textContent = f.name; row.appendChild(span);
                });
                log.appendChild(row);
            }
            if (wantsLong && wantsAll) addLine('# good habit — always ls -la when auditing a system', 'log-line--easter');
            updatePlaceholder();
        }

        function catIntroduction() {
            addBlank();
            var anchor = addLine('─── introduction.txt ─────────────────────────────────', 'log-line--divider');
            addBlank();
            addLine('OVERVIEW TO PASSWORD SAFETY', 'log-line--heading');
            addBlank();
            addLine('linux is a multi-user operating system — multiple accounts can exist on a', 'log-line--body');
            addLine('single machine, and every one of them is a potential way in. auditing', 'log-line--body');
            addLine('passwords means finding weak, exposed, or misconfigured credentials before', 'log-line--body');
            addLine('someone else does.', 'log-line--body');
            addBlank();
            addLine('on linux images you will be given a README file with user credentials.', 'log-line--body');
            addLine('check to see if there are users using basic or weak passwords.', 'log-line--body');
            addLine('it is recommended to change all passwords to strong ones.', 'log-line--body');
            addLine('$ sudo passwd username             # change a user\'s password', 'log-line--cmd-example');
            addLine('strong passwords often have a mix of uppercase, lowercase, numbers, and special characters.', 'log-line--body');
            addBlank();
            addLine('read the other files in this directory for more information!', 'log-line--body');
            addBlank();
            addLine('─── end of file ──────────────────────────────────────', 'log-line--divider');
            addBlank();
            return anchor;
        }

        function catPasswords() {
            addBlank();
            var anchor = addLine('─── passwords.txt ────────────────────────────────────', 'log-line--divider');
            addBlank();
            addLine('BASIC PASSWORD SECURITY', 'log-line--heading');
            addBlank();
            addLine('weak, reused, or default passwords can easily lead to your system being compromised.', 'log-line--body');
            addLine('thankfully, it is a pretty easy vulnerability to fix.', 'log-line--body');
            addBlank();
            addLine('what makes a password weak:', 'log-line--body');
            addLine('  — short length (anything under ~12 characters falls fast to brute force)', 'log-line--indent');
            addLine('  — dictionary words, names, or keyboard patterns ("qwerty123", "letmein")', 'log-line--indent');
            addLine('  — reused across multiple accounts or services', 'log-line--indent');
            addLine('  — left at a vendor default ("admin/admin", "root/toor")', 'log-line--indent');
            addBlank();
            addLine('common ways passwords get cracked or stolen:', 'log-line--body');
            addLine('  brute force        — trying every possible combination', 'log-line--indent');
            addLine('  dictionary attack   — trying known words and leaked password lists', 'log-line--indent');
            addLine('  credential stuffing — reusing passwords leaked from other breaches', 'log-line--indent');
            addLine('  rainbow tables      — precomputed hash lookups against unsalted hashes', 'log-line--indent');
            addBlank();
            addLine('why hashing (and salting) matters:', 'log-line--body');
            addLine('  passwords should never be stored in plaintext. a hash is a one-way', 'log-line--indent');
            addLine('  fingerprint of the password; a salt is random data mixed in per-account', 'log-line--indent');
            addLine('  so two identical passwords don\'t produce the same hash. see shadow.', 'log-line--indent');
            addBlank();
            addLine('baseline recommendations:', 'log-line--body');
            addLine('  — prioritize length over forced complexity (a long passphrase beats P@ss1)', 'log-line--indent');
            addLine('  — unique password per account/service', 'log-line--indent');
            addLine('  — enable multi-factor authentication wherever it is offered', 'log-line--indent');
            addLine('  — rotate or disable any account still on a default credential', 'log-line--indent');
            addBlank();
            addLine('─── end of file ──────────────────────────────────────', 'log-line--divider');
            addBlank();
            return anchor;
        }

        function catShadow() {
            addBlank();
            var anchor = addLine('─── shadow ───────────────────────────────────────────', 'log-line--divider');
            addBlank();
            addLine('/etc/shadow', 'log-line--heading');
            addBlank();
            addLine('/etc/shadow stores hashed passwords and password aging policy for each account.', 'log-line--body');
            addLine('unlike /etc/passwd (the file with all the users), this file is only readable by root — a key security measure.', 'log-line--body');
            addBlank();
            addLine('each line follows this format:', 'log-line--body');
            addLine('  username:hash:lastchange:min:max:warn:inactive:expire:reserved', 'log-line--cmd-example');
            addBlank();
            addLine('a real example:', 'log-line--body');
            addLine('  frhs:$6$salt$hashedpassword:19800:0:99999:7:::', 'log-line--cmd-example');
            addLine('  field 1 — username (frhs)', 'log-line--indent');
            addLine('  field 2 — hashed password  ($6$ = SHA-512)', 'log-line--indent');
            addLine('  field 3 — days since epoch the password was last changed', 'log-line--indent');
            addLine('  field 4 — minimum days before password can be changed', 'log-line--indent');
            addLine('  field 5 — maximum days before password must be changed', 'log-line--indent');
            addLine('  field 6 — days of warning before expiry', 'log-line--indent');
            addLine('  note: you do NOT want your passwords to have no expiration (99999)', 'log-line--indent');
            addLine('  you can fix the defaults in /etc/login.defs, or per-account with the chage command.', 'log-line--indent');
            addBlank();
            addLine('things to watch for:', 'log-line--body');
            addLine('  — empty hash field (::) means no password — anyone can log in as this account', 'log-line--indent');
            addLine('  — ! or * at the start of the hash means the account is locked (good; you can also add it there yourself)', 'log-line--indent');
            addLine('  — $1$ = MD5 (weak and old), $5$ = SHA-256, $6$ = SHA-512 (preferred)', 'log-line--indent');
            addLine('  — $y$ is yescrypt and that is okay too.', 'log-line--indent');
            addBlank();
            addLine('useful commands:', 'log-line--body');
            addLine('$ sudo cat /etc/shadow             # view shadow file (requires root)', 'log-line--cmd-example');
            addLine('note: if you are NOT root and you can read the file, that is a security risk', 'log-line--indent');
            addLine('and can be fixed with chmod 640 /etc/shadow!', 'log-line--indent');
            addLine('$ sudo passwd username             # change a user\'s password', 'log-line--cmd-example');
            addLine('$ sudo passwd -l username          # lock an account, sometimes you may want to lock root', 'log-line--cmd-example');
            addLine('$ sudo passwd -u username          # unlock an account', 'log-line--cmd-example');
            addLine('$ sudo chage -l username           # view password aging info', 'log-line--cmd-example');
            addBlank();
            addLine('─── end of file ──────────────────────────────────────', 'log-line--divider');
            addBlank();
            return anchor;
        }

        function catLoginDefs() {
            addBlank();
            var anchor = addLine('─── login.defs ───────────────────────────────────────', 'log-line--divider');
            addBlank();
            addLine('/etc/login.defs', 'log-line--heading');
            addBlank();
            addLine('/etc/login.defs sets the system-wide defaults that tools like useradd,', 'log-line--body');
            addLine('passwd, and login fall back on when nothing more specific overrides them.', 'log-line--body');
            addLine('this is the file that decides how strict password aging is by default,', 'log-line--body');
            addLine('as well as the hash algorithm used for new passwords', 'log-line--body');
            addBlank();
            addLine('inside the files, there are some important directives you should set:', 'log-line--body');
            addLine('  PASS_MAX_DAYS 90   — max days a password is valid before forced change', 'log-line--indent');
            addLine('  PASS_MIN_DAYS 10      — min days before a password can be changed again', 'log-line--indent');
            addLine('  PASS_WARN_AGE 14      — days of warning shown before a password expires', 'log-line--indent');
            addLine('  ENCRYPT_METHOD SHA512 — hashing algorithm used for new passwords', 'log-line--indent');
            addLine('  note that changing the hashing algorithm will not rehash existing passwords, only new ones,', 'log-line--indent');
            addLine('  you\'ll need to change the password for each account to rehash it.', 'log-line--indent');
            addLine('why it matters in an audit:', 'log-line--body');
            addBlank();
            addLine('  — PASS_MAX_DAYS 99999 effectively means "passwords never expire"', 'log-line--indent');
            addLine('  — a weak ENCRYPT_METHOD (e.g. MD5) means every new password is stored weakly', 'log-line--indent');
            addBlank();
            addLine('note: login.defs sets defaults at account-creation time. it does NOT change', 'log-line--body');
            addLine('the aging policy on accounts that already exist — use chage for that.', 'log-line--body');
            addBlank();
            addLine('useful commands:', 'log-line--body');
            addLine('$ cat /etc/login.defs              # view current defaults', 'log-line--cmd-example');
            addLine('$ nano /etc/login.defs             # edit defaults', 'log-line--cmd-example');
            addLine('$ chage -m 10 -M 90 -W 14 username # change expiries (min, max, warn) for a user', 'log-line--cmd-example');
            addBlank();
            addLine('─── end of file ──────────────────────────────────────', 'log-line--divider');
            addBlank();
            return anchor;
        }

        function catForensics() {
            addBlank();
            var anchor = addLine('─── forensics.txt ────────────────────────────────────', 'log-line--divider');
            addBlank();
            addLine('LOCATING EXPOSED AND HARDCODED PASSWORDS', 'log-line--heading');
            addBlank();
            addLine('plaintext credentials end up scattered across a filesystem far more often', 'log-line--body');
            addLine('than you\'d expect — left behind in scripts, configs, shell history, and', 'log-line--body');
            addLine('source code. finding them is usually just a matter of searching in the', 'log-line--body');
            addLine('right places. remember to check any mysterious .txt files on your system! ', 'log-line--body');
            addBlank();
            addLine('you can run these commands to help look for them:', 'log-line--body');
            addBlank();
            addLine('search the filesystem for likely keywords:', 'log-line--body');
            addLine('$ grep -ril "password" /var/www /etc /opt 2>/dev/null', 'log-line--cmd-example');
            addLine('$ grep -rEi "(password|passwd|secret|api_key|token)\\s*=" / 2>/dev/null', 'log-line--cmd-example');
            addBlank();
            addLine('find files that are world-readable and contain likely keywords:', 'log-line--body');
            addLine('$ find / -type f -perm -o+r -exec grep -i "password" {} \\; 2>/dev/null', 'log-line--cmd-example');
            addBlank();
            addLine('common places to check:', 'log-line--body');
            addLine('  ~/.bash_history       — commands often contain passwords typed by mistake', 'log-line--indent');
            addLine('  ~/.mysql_history      — raw SQL, sometimes including CREATE USER statements', 'log-line--indent');
            addLine('  .env files            — app secrets, frequently left world-readable', 'log-line--indent');
            addLine('  config.php / wp-config.php  — database credentials in plaintext', 'log-line--indent');
            addLine('  backup files (*.bak, *.old, *~)  — often forgotten and unprotected', 'log-line--indent');
            addBlank();
            addLine('if you find something: change your passwords or rm the file.', 'log-line--body');
            addLine('if you\'re unsure, you could rename the file with the mv command', 'log-line--body');
            addLine('and check if it scores points.', 'log-line--body');
            addBlank();
            addLine('─── end of file ──────────────────────────────────────', 'log-line--divider');
            addBlank();
            return anchor;
        }

        function catDatabases() {
            addBlank();
            var anchor = addLine('─── databases.txt ────────────────────────────────────', 'log-line--divider');
            addBlank();
            addLine('EXPOSED PASSWORDS IN DATABASES', 'log-line--heading');
            addBlank();
            addLine('if one of your critical services is a database like mysql or mariadb, it is worth checking for exposed credentials.', 'log-line--body');
            addLine('databases can sometimes have plaintext passwords sitting in tables and configurations', 'log-line--body');
            addBlank();
            addLine('database credentials are usually stored in a config file next to the app:', 'log-line--body');
            addLine('  /etc/mysql/my.cnf / ~/.my.cnf   — MySQL/MariaDB client defaults', 'log-line--indent');
            addLine('  wp-config.php                    — WordPress DB credentials', 'log-line--indent');
            addLine('  settings.py                      — Django DB credentials', 'log-line--indent');
            addLine('  .env / config.yml / config.json  — general app configuration', 'log-line--indent');
            addBlank();
            addLine('commands to search for them directly:', 'log-line--body');
            addLine('$ grep -ri "DB_PASSWORD\\|DATABASE_URL|password|passwd|user|username" . -r 2>/dev/null', 'log-line--cmd-example');
            addLine('$ find / -iname "*.cnf" 2>/dev/null', 'log-line--cmd-example');
            addBlank();
            addLine('additional weak configurations to check for:', 'log-line--body');
            addLine('  — root/admin account with no password set at all', 'log-line--indent');
            addLine('  — remote root login enabled (root@% instead of root@localhost)', 'log-line--indent');
            addLine('  — a database exposed to the network with default credentials still active', 'log-line--indent');
            addBlank();
            addLine('if you want to, you can look up respective commands for the database and look through the tables', 'log-line--body');
            addLine('these are just basic things to watch out for.', 'log-line--body');
            addBlank();
            addLine('─── end of file ──────────────────────────────────────', 'log-line--divider');
            addBlank();
            return anchor;
        }

        function catCommands() {
            addBlank();
            var anchor = addLine('─── commands.txt ─────────────────────────────────────', 'log-line--divider');
            addBlank();
            addLine('USEFUL COMMANDS FOR PASSWORD MANAGEMENT', 'log-line--heading');
            addBlank();
            addLine('a single reference for the commands scattered across the other files here.', 'log-line--body');
            addBlank();
            addLine('changing and locking passwords:', 'log-line--body');
            addLine('$ sudo passwd username             # set/change a user\'s password', 'log-line--cmd-example');
            addLine('$ sudo passwd -l username          # lock an account (prepends ! to the hash)', 'log-line--cmd-example');
            addLine('$ sudo passwd -u username          # unlock a previously locked account', 'log-line--cmd-example');
            addLine('$ sudo passwd -e username          # force password change at next login', 'log-line--cmd-example');
            addBlank();
            addLine('password aging:', 'log-line--body');
            addLine('$ sudo chage -l username            # view an account\'s aging info', 'log-line--cmd-example');
            addLine('$ sudo chage -M 90 username         # set max password age to 90 days', 'log-line--cmd-example');
            addLine('$ sudo chage -d 0 username          # force password change on next login', 'log-line--cmd-example');
            addBlank();
            addLine('account management:', 'log-line--body');
            addLine('$ sudo useradd -m -s /bin/bash username   # create a new account with a home dir', 'log-line--cmd-example');
            addLine('$ sudo usermod -L username          # lock an account (same as passwd -l)', 'log-line--cmd-example');
            addLine('$ sudo userdel -r username          # delete an account and its home directory', 'log-line--cmd-example');
            addBlank();
            addLine('bulk / scripted password changes:', 'log-line--body');
            addLine('$ echo "username:newpassword" | sudo chpasswd   # set a password non-interactively', 'log-line--cmd-example');
            addBlank();
            addLine('auditing:', 'log-line--body');
            addLine('$ sudo cat /etc/shadow | awk -F: \'($2==""){print $1}\'   # accounts with no password', 'log-line--cmd-example');
            addLine('$ sudo cat /etc/shadow | awk -F: \'($2 ~ /^[!*]/){print $1}\'   # locked accounts', 'log-line--cmd-example');
            addBlank();
            addLine('─── end of file ──────────────────────────────────────', 'log-line--divider');
            addBlank();
            return anchor;
        }

        function catTldr() {
            addBlank();
            var anchor = addLine('─── tldr.txt ─────────────────────────────────────────', 'log-line--divider');
            addBlank();
            addLine('QUICK REFERENCE', 'log-line--heading');
            addBlank();
            addLine('password fundamentals:', 'log-line--body');
            addLine('  weak = short, dictionary-based, reused, or still on a default value', 'log-line--indent');
            addLine('  fix  = set a strong password policy to require complexity ', 'log-line--indent');
            addBlank();
            addLine('/etc/shadow:', 'log-line--body');
            addLine('$ sudo passwd -l username           # lock an account', 'log-line--cmd-example');
            addLine('$ look for bad password expiries, no hashes, bad hashing algorithms', 'log-line--indent');
            addBlank();
            addLine('/etc/login.defs:', 'log-line--body');
            addLine('set default hashing algorithm, password expiries', 'log-line--indent');
            addBlank();
            addLine('pam.d/ — enforce password policy', 'log-line--body');
            addLine('  require passwords to have a certain length, different characters, etc.', 'log-line--indent');
            addBlank();
            addLine('forensics:', 'log-line--body');
            addLine('$ use commands and check common suspects to find exposed passwords', 'log-line--cmd-example');
            addBlank();
            addLine('databases:', 'log-line--body');
            addLine('$ check databases for plaintext/exposed passwords', 'log-line--cmd-example');
            addBlank();
            addBlank();
            addLine('─── end of file ──────────────────────────────────────', 'log-line--divider');
            addBlank();
            return anchor;
        }

        function doCat(target) {
            var anchor;
            if      (target === 'introduction.txt') { anchor = catIntroduction(); read['introduction.txt'] = true; }
            else if (target === 'passwords.txt')     { anchor = catPasswords();    read['passwords.txt']    = true; }
            else if (target === 'shadow')            { anchor = catShadow();       read['shadow']           = true; }
            else if (target === 'login.defs')        { anchor = catLoginDefs();    read['login.defs']       = true; }
            else if (target === 'forensics.txt')     { anchor = catForensics();    read['forensics.txt']    = true; }
            else if (target === 'databases.txt')     { anchor = catDatabases();    read['databases.txt']    = true; }
            else if (target === 'commands.txt')      { anchor = catCommands();     read['commands.txt']     = true; }
            else if (target === 'tldr.txt')          { anchor = catTldr();         read['tldr.txt']         = true; }
            else if (target === 'pam.d' || target === 'pam.d/') {
                addLine('cat: pam.d/: Is a directory', 'log-line--error');
                return;
            } else {
                addLine('cat: ' + target + ': No such file or directory', 'log-line--error');
                return;
            }
            updatePlaceholder();
            if (anchor) scrollToEl(anchor);
            if (FILES.every(function(f){ return read[f]; })) {
                inputRow.style.display = 'none';
                hint.style.display = 'flex';
                document.getElementById('nav-input').focus();
            }
        }

        function handleCmd(raw, promptStr, isNav) {
            addLine(promptStr + raw, 'log-line--cmd');
            var anchorIndex = log.children.length;
            var parts = raw.split(/\s+/), cmd = parts[0].toLowerCase(), args = parts.slice(1);

            if (cmd === 'ls') {
                doLs(args);
            } else if (cmd === 'cat') {
                if (!args[0]) addLine('cat: missing operand', 'log-line--error');
                else if (!isNav) doCat(args[0].toLowerCase());
                else addLine('bash: cat: use the main prompt to read files', 'log-line--error');
            } else if (cmd === 'cd') {
                var target = args.join('');
                if (isNav) {
                    var routes = {
                        '..': 'index.html', '~': 'index.html', '/home': 'index.html',
                        '../basics': 'basics.html', '../passwords': 'passwords.html',
                        '../ssh': 'ssh.html', '../services': 'pas.html', '../backdoors': 'backdoors.html'
                    };
                    if (routes[target]) {
                        addLine('leaving passwords/ ...', 'log-line--info');
                        document.getElementById('nav-input').disabled = true;
                        setTimeout(function(){ window.location.href = routes[target]; }, 400);
                    } else {
                        addLine('bash: cd: ' + target + ': No such file or directory', 'log-line--error');
                    }
                } else {
                    if (!target || target === '..' || target === '~' || target === '/home') {
                        window.location.href = 'index.html';
                    } else if (target === 'pam.d' || target === 'pam.d/' || target === './pam.d') {
                        addLine('entering pam.d/ ...', 'log-line--info');
                        setTimeout(function(){ window.location.href = 'pam.d.html'; }, 400);
                    } else {
                        addLine('bash: cd: ' + target + ': No such file or directory', 'log-line--error');
                    }
                }
            } else if (cmd === 'pwd') {
                addLine('/home/frhs/passwords', 'log-line--info');
            } else {
                addLine('bash: ' + cmd + ': command not found', 'log-line--error');
            }

            var anchor = log.children[anchorIndex];
            if (anchor) scrollToEl(anchor);
        }

        input.addEventListener('keydown', function(e) {
            if (e.key !== 'Enter') return;
            var raw = input.value.trim(); if (!raw) return;
            input.value = '';
            handleCmd(raw, PROMPT, false);
        });

        var navInput = document.getElementById('nav-input');
        navInput.addEventListener('keydown', function(e) {
            if (e.key === 'Tab') { e.preventDefault(); tabComplete(navInput, FILES, CD_NAV); return; }
            if (e.key !== 'Enter') return;
            var raw = navInput.value.trim(); if (!raw) return;
            navInput.value = '';
            handleCmd(raw, PROMPT, true);
        });

        input.focus();
    })();
    </script>
</body>
</html>
