<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pam.d/ — need help on linux?</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .log-line--heading {
            color: var(--accent-amber-bright);
            font-weight: 700;
            font-size: 1rem;
            margin-top: 6px;
        }
        .log-line--body        { color: var(--text-secondary); padding-left: 2px; }
        .log-line--indent      { color: var(--text-secondary); padding-left: 20px; }
        .log-line--cmd-example { color: var(--accent-amber); padding-left: 20px; }
        .log-line--divider     { color: var(--border-strong); letter-spacing: 2px; }
        .terminal-log          { margin-bottom: 12px; }
        .file-unread           { color: var(--text-primary); }
        .file-read              { color: var(--text-dim); }
    </style>
</head>
<body>
    <p class="eyebrow">
        <span class="prompt-symbol">frhs@ubuntu:~/home/frhs/passwords/pam.d#</span>
    </p>

    <h1>welcome to pam.d</h1>
    <h2>pluggable authentication modules — configuration deep dive</h2>

    <div id="terminal-log" class="terminal-log" role="log" aria-live="polite"></div>

    <div class="terminal-input" id="input-row">
        <span class="prompt-symbol">frhs@ubuntu:~/home/frhs/passwords/pam.d#</span>
        <input type="text" id="cmd-input" class="cmd-input"
            autocomplete="off" autocapitalize="off" spellcheck="false"
            placeholder="try: ls" aria-label="Terminal command input">
    </div>

    <div class="terminal-input" id="nav-hint" style="display:none">
        <span class="prompt-symbol">frhs@ubuntu:~/home/frhs/passwords/pam.d#</span>
        <input type="text" id="nav-input" class="cmd-input"
            autocomplete="off" autocapitalize="off" spellcheck="false"
            placeholder="cd .. to go back" aria-label="Navigation input">
    </div>

    <noscript>
        <p>Enable JavaScript to use the interactive terminal.</p>
        <a href="passwords.html"><button>Return to passwords/</button></a>
    </noscript>

    <script>
    (function () {
        var PROMPT = 'frhs@ubuntu:~/home/frhs/passwords/pam.d# ';
        var input    = document.getElementById('cmd-input');
        var log      = document.getElementById('terminal-log');
        var hint     = document.getElementById('nav-hint');
        var inputRow = document.getElementById('input-row');

        var read = {
            'introduction.txt': false,
            'password.txt':     false,
            'auth.txt':         false,
            'modules.txt':      false
        };

        var FILES    = Object.keys(read);
        var COMMANDS = ['ls', 'cat', 'cd', 'pwd'];
        var CD_MAIN  = ['..', '~', '/home'];
        var CD_NAV   = ['..', '~', '/home'];

        function addLine(text, cls) {
            var p = document.createElement('p');
            p.className = 'log-line ' + (cls || '');
            p.textContent = text;
            log.appendChild(p);
            return p;
        }
        function addBlank() { return addLine('', ''); }
        function scrollToEl(el) {
            requestAnimationFrame(function() {
                el.scrollIntoView({ behavior: 'smooth', block: 'start' });
            });
        }
        function updatePlaceholder() {
            var unread = FILES.filter(function(f){ return !read[f]; });
            input.placeholder = unread.length === 0
                ? 'all files read! cd .. to go back'
                : 'try: cat ' + unread[0];
        }

        function tabComplete(inputEl, availableFiles, availableCd) {
            var val = inputEl.value, parts = val.split(/\s+/), cmd = parts[0].toLowerCase();
            if (parts.length === 1 && !val.endsWith(' ')) {
                var m = COMMANDS.filter(function(c){ return c.startsWith(cmd); });
                if (m.length === 1) inputEl.value = m[0] + ' ';
                return;
            }
            var partial = parts.slice(1).join(' ');
            if (cmd === 'cat') {
                var m = availableFiles.filter(function(f){ return f.startsWith(partial); });
                if (m.length === 1) inputEl.value = 'cat ' + m[0];
            } else if (cmd === 'cd') {
                var m = availableCd.filter(function(d){ return d.startsWith(partial); });
                if (m.length === 1) inputEl.value = 'cd ' + m[0];
            } else if (cmd === 'ls') {
                var flags = ['-l', '-la'], idx = flags.indexOf(partial);
                inputEl.value = 'ls ' + flags[(idx + 1) % flags.length];
            }
        }

        input.addEventListener('keydown', function(e) {
            if (e.key === 'Tab') { e.preventDefault(); tabComplete(input, FILES, CD_MAIN); }
        });

        function doLs(args) {
            var fc = args.join('').replace(/-/g,'').toLowerCase();
            var wantsLong = fc.indexOf('l') !== -1, wantsAll = fc.indexOf('a') !== -1;
            var files = [
                { name: 'introduction.txt', desc: 'what PAM is and how it fits together' },
                { name: 'password.txt',     desc: 'the password group — updating credentials' },
                { name: 'auth.txt',         desc: 'the auth group — verifying identity' },
                { name: 'modules.txt',      desc: 'default and security-hardening PAM modules' }
            ];
            if (wantsLong) {
                addLine('total ' + files.length, 'log-line--info');
                files.forEach(function(f) {
                    var p = document.createElement('p'); p.className = 'log-line log-line--dir';
                    var perm = document.createElement('span'); perm.className = 'dir-perm'; perm.textContent = '-rw-r--r--';
                    var name = document.createElement('span'); name.className = 'dir-name ' + (read[f.name] ? 'file-read' : 'file-unread'); name.textContent = f.name;
                    var desc = document.createElement('span'); desc.className = 'dir-desc'; desc.textContent = f.desc;
                    p.appendChild(perm); p.appendChild(name); p.appendChild(desc); log.appendChild(p);
                });
            } else {
                var row = document.createElement('p'); row.className = 'log-line log-line--ls';
                files.forEach(function(f) {
                    var span = document.createElement('span');
                    span.className = 'dir-name ' + (read[f.name] ? 'file-read' : 'file-unread');
                    span.textContent = f.name; row.appendChild(span);
                });
                log.appendChild(row);
            }
            if (wantsLong && wantsAll) addLine('# good habit — always ls -la when auditing a system', 'log-line--easter');
            updatePlaceholder();
        }

        function catIntroduction() {
            addBlank();
            var anchor = addLine('─── introduction.txt ─────────────────────────────────', 'log-line--divider');
            addBlank();
            addLine('INTRO TO PAM', 'log-line--heading');
            addBlank();
            addLine('PAM (Pluggable Authentication Modules) is a framework that lets system', 'log-line--body');
            addLine('administrators change how authentication works without recompiling every', 'log-line--body');
            addLine('program that needs it. login, sshd, sudo, and passwd are all "PAM-aware" —', 'log-line--body');
            addLine('they hand the actual identity check off to PAM instead of doing it themselves.', 'log-line--body');
            addBlank();
            addLine('every PAM-aware service has a config file here in /etc/pam.d/, named after', 'log-line--body');
            addLine('the service itself:', 'log-line--body');
            addLine('  /etc/pam.d/sudo    — rules for sudo authentication', 'log-line--cmd-example');
            addLine('  /etc/pam.d/sshd    — rules for SSH login', 'log-line--cmd-example');
            addLine('  /etc/pam.d/login   — rules for local console login', 'log-line--cmd-example');
            addBlank();
            addLine('on Debian/Ubuntu, most of these files just @include a handful of shared files', 'log-line--body');
            addLine('so the rules stay consistent across services:', 'log-line--body');
            addLine('  /etc/pam.d/common-auth       — shared authentication rules', 'log-line--cmd-example');
            addLine('  /etc/pam.d/common-account    — shared account validity rules', 'log-line--cmd-example');
            addLine('  /etc/pam.d/common-password   — shared password-change rules', 'log-line--cmd-example');
            addLine('  /etc/pam.d/common-session    — shared session setup rules', 'log-line--cmd-example');
            addBlank();
            addLine('RHEL/CentOS/Fedora instead centralize things in:', 'log-line--body');
            addLine('  /etc/pam.d/system-auth   and   /etc/pam.d/password-auth', 'log-line--cmd-example');
            addBlank();
            addLine('each line inside these files has this shape:', 'log-line--body');
            addLine('  type   control   module-path   [module-arguments]', 'log-line--cmd-example');
            addLine('  auth   required  pam_unix.so    nullok', 'log-line--cmd-example');
            addBlank();
            addLine('read the other files here to see how the "type" and "control" fields work', 'log-line--body');
            addLine('in practice, and which modules are worth knowing.', 'log-line--body');
            addBlank();
            addLine('─── end of file ──────────────────────────────────────', 'log-line--divider');
            addBlank();
            return anchor;
        }

        function catPassword() {
            addBlank();
            var anchor = addLine('─── password.txt ─────────────────────────────────────', 'log-line--divider');
            addBlank();
            addLine('THE password GROUP', 'log-line--heading');
            addBlank();
            addLine('the password type governs what happens when an account\'s password is', 'log-line--body');
            addLine('changed — e.g. whenever someone runs `passwd`. this is where complexity and', 'log-line--body');
            addLine('reuse policy live.', 'log-line--body');
            addBlank();
            addLine('you will find these rules in:', 'log-line--body');
            addLine('  /etc/pam.d/common-password   (Debian/Ubuntu)', 'log-line--cmd-example');
            addLine('  /etc/pam.d/system-auth       (RHEL/CentOS/Fedora)', 'log-line--cmd-example');
            addBlank();
            addLine('two modules do most of the work:', 'log-line--body');
            addLine('  pam_pwquality.so   — rejects weak passwords before they are ever set', 'log-line--indent');
            addLine('  pam_unix.so        — actually hashes and stores the new password', 'log-line--indent');
            addBlank();
            addLine('example line enforcing complexity:', 'log-line--body');
            addLine('  password requisite pam_pwquality.so retry=3 minlen=12 dcredit=-1 ucredit=-1', 'log-line--cmd-example');
            addLine('  minlen    — minimum password length', 'log-line--indent');
            addLine('  retry     — how many attempts before giving up', 'log-line--indent');
            addLine('  dcredit / ucredit / lcredit / ocredit  — require a digit / uppercase /', 'log-line--indent');
            addLine('  lowercase / special character (negative number = required count)', 'log-line--indent');
            addBlank();
            addLine('example line preventing password reuse:', 'log-line--body');
            addLine('  password sufficient pam_unix.so sha512 remember=5', 'log-line--cmd-example');
            addLine('  sha512    — hash algorithm used when storing the new password', 'log-line--indent');
            addLine('  remember  — how many previous password hashes to block reuse of', 'log-line--indent');
            addBlank();
            addLine('useful commands:', 'log-line--body');
            addLine('$ cat /etc/pam.d/common-password   # view the active password policy', 'log-line--cmd-example');
            addLine('$ sudo apt install libpam-pwquality  # install pam_pwquality on Debian/Ubuntu', 'log-line--cmd-example');
            addBlank();
            addLine('─── end of file ──────────────────────────────────────', 'log-line--divider');
            addBlank();
            return anchor;
        }

        function catAuth() {
            addBlank();
            var anchor = addLine('─── auth.txt ─────────────────────────────────────────', 'log-line--divider');
            addBlank();
            addLine('THE auth GROUP', 'log-line--heading');
            addBlank();
            addLine('the auth type answers one question: "is this really who they say they are?"', 'log-line--body');
            addLine('it is the first gate a login attempt has to pass through, before account or', 'log-line--body');
            addLine('session rules ever run.', 'log-line--body');
            addBlank();
            addLine('you will find these rules in:', 'log-line--body');
            addLine('  /etc/pam.d/common-auth   (Debian/Ubuntu)', 'log-line--cmd-example');
            addLine('  /etc/pam.d/sshd, /etc/pam.d/sudo, /etc/pam.d/login  (per-service)', 'log-line--cmd-example');
            addBlank();
            addLine('the baseline rule almost every system has:', 'log-line--body');
            addLine('  auth required pam_unix.so nullok', 'log-line--cmd-example');
            addLine('  pam_unix.so checks the password against the hash in /etc/shadow.', 'log-line--indent');
            addLine('  the nullok argument is dangerous — it allows an empty password to pass.', 'log-line--indent');
            addLine('  remove nullok unless you have a specific reason to keep it.', 'log-line--indent');
            addBlank();
            addLine('brute-force protection — lock an account after repeated failed attempts:', 'log-line--body');
            addLine('  auth required pam_faillock.so preauth deny=5 unlock_time=900', 'log-line--cmd-example');
            addLine('  deny         — number of failed attempts before locking', 'log-line--indent');
            addLine('  unlock_time  — seconds before the lock automatically clears', 'log-line--indent');
            addBlank();
            addLine('two-factor authentication (TOTP) on top of a password:', 'log-line--body');
            addLine('  auth required pam_google_authenticator.so', 'log-line--cmd-example');
            addBlank();
            addLine('useful commands:', 'log-line--body');
            addLine('$ cat /etc/pam.d/common-auth        # view the active auth policy', 'log-line--cmd-example');
            addLine('$ faillock --user username           # check/reset a user\'s lockout status', 'log-line--cmd-example');
            addBlank();
            addLine('─── end of file ──────────────────────────────────────', 'log-line--divider');
            addBlank();
            return anchor;
        }

        function catModules() {
            addBlank();
            var anchor = addLine('─── modules.txt ──────────────────────────────────────', 'log-line--divider');
            addBlank();
            addLine('DEFAULT AND SECURITY-HARDENING MODULES', 'log-line--heading');
            addBlank();
            addLine('modules live in /lib/x86_64-linux-gnu/security/ (path varies by distro) and', 'log-line--body');
            addLine('are referenced by filename in the pam.d configs. most systems ship with a', 'log-line--body');
            addLine('baseline set already installed:', 'log-line--body');
            addLine('  pam_unix.so     — classic unix password/account checks against /etc/shadow', 'log-line--indent');
            addLine('  pam_env.so      — loads environment variables at login', 'log-line--indent');
            addLine('  pam_limits.so   — enforces resource limits (ulimits) per user', 'log-line--indent');
            addLine('  pam_deny.so     — always denies; used as a safe fallback at the end of a stack', 'log-line--indent');
            addBlank();
            addLine('worth installing for a hardened, competition-ready box:', 'log-line--body');
            addLine('  pam_pwquality.so           — password strength enforcement', 'log-line--cmd-example');
            addLine('  pam_faillock.so            — account lockout after failed logins', 'log-line--cmd-example');
            addLine('  pam_wheel.so               — restricts `su` to members of the wheel group', 'log-line--cmd-example');
            addLine('  pam_access.so              — allow/deny logins based on user, host, or tty', 'log-line--cmd-example');
            addLine('  pam_google_authenticator.so — TOTP-based 2FA', 'log-line--cmd-example');
            addBlank();
            addLine('install commands (Debian/Ubuntu):', 'log-line--body');
            addLine('$ sudo apt install libpam-pwquality', 'log-line--cmd-example');
            addLine('$ sudo apt install libpam-google-authenticator', 'log-line--cmd-example');
            addBlank();
            addLine('install commands (RHEL/CentOS/Fedora):', 'log-line--body');
            addLine('$ sudo dnf install pam_pwquality google-authenticator', 'log-line--cmd-example');
            addBlank();
            addLine('after installing a module, add a rule for it to the matching pam.d file —', 'log-line--body');
            addLine('installing alone does nothing until it is referenced in a config.', 'log-line--body');
            addBlank();
            addLine('useful commands:', 'log-line--body');
            addLine('$ ls /lib/*/security/ 2>/dev/null | sort -u   # list installed PAM modules', 'log-line--cmd-example');
            addBlank();
            addLine('you have now read every file in pam.d/. cd .. to head back to passwords/.', 'log-line--body');
            addBlank();
            addLine('─── end of file ──────────────────────────────────────', 'log-line--divider');
            addBlank();
            return anchor;
        }

        function doCat(target) {
            var anchor;
            if      (target === 'introduction.txt') { anchor = catIntroduction(); read['introduction.txt'] = true; }
            else if (target === 'password.txt')      { anchor = catPassword();     read['password.txt']     = true; }
            else if (target === 'auth.txt')          { anchor = catAuth();         read['auth.txt']         = true; }
            else if (target === 'modules.txt')       { anchor = catModules();      read['modules.txt']      = true; }
            else {
                addLine('cat: ' + target + ': No such file or directory', 'log-line--error');
                return;
            }
            updatePlaceholder();
            if (anchor) scrollToEl(anchor);
            if (FILES.every(function(f){ return read[f]; })) {
                inputRow.style.display = 'none';
                hint.style.display = 'flex';
                document.getElementById('nav-input').focus();
            }
        }

        function handleCmd(raw, promptStr, isNav) {
            addLine(promptStr + raw, 'log-line--cmd');
            var anchorIndex = log.children.length;
            var parts = raw.split(/\s+/), cmd = parts[0].toLowerCase(), args = parts.slice(1);

            if (cmd === 'ls') {
                doLs(args);
            } else if (cmd === 'cat') {
                if (!args[0]) addLine('cat: missing operand', 'log-line--error');
                else if (!isNav) doCat(args[0].toLowerCase());
                else addLine('bash: cat: use the main prompt to read files', 'log-line--error');
            } else if (cmd === 'cd') {
                var target = args.join('');
                if (isNav) {
                    var routes = { '..': 'passwords.html', '~': 'index.html', '/home': 'index.html' };
                    if (routes[target]) {
                        addLine('leaving pam.d/ ...', 'log-line--info');
                        document.getElementById('nav-input').disabled = true;
                        setTimeout(function(){ window.location.href = routes[target]; }, 400);
                    } else {
                        addLine('bash: cd: ' + target + ': No such file or directory', 'log-line--error');
                    }
                } else {
                    if (!target || target === '..') {
                        window.location.href = 'passwords.html';
                    } else if (target === '~' || target === '/home') {
                        window.location.href = 'index.html';
                    } else {
                        addLine('bash: cd: ' + target + ': No such file or directory', 'log-line--error');
                    }
                }
            } else if (cmd === 'pwd') {
                addLine('/home/frhs/passwords/pam.d', 'log-line--info');
            } else {
                addLine('bash: ' + cmd + ': command not found', 'log-line--error');
            }

            var anchor = log.children[anchorIndex];
            if (anchor) scrollToEl(anchor);
        }

        input.addEventListener('keydown', function(e) {
            if (e.key !== 'Enter') return;
            var raw = input.value.trim(); if (!raw) return;
            input.value = '';
            handleCmd(raw, PROMPT, false);
        });

        var navInput = document.getElementById('nav-input');
        navInput.addEventListener('keydown', function(e) {
            if (e.key === 'Tab') { e.preventDefault(); tabComplete(navInput, FILES, CD_NAV); return; }
            if (e.key !== 'Enter') return;
            var raw = navInput.value.trim(); if (!raw) return;
            navInput.value = '';
            handleCmd(raw, PROMPT, true);
        });

        input.focus();
    })();
    </script>
</body>
</html>
